# One command brings up the whole platform:  docker compose up --build
# Services talk to each other over the compose network using service names.
name: media-platform

services:
  # ───────────────────────── datastores ─────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"

  # ───────────────────────── observability ─────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ───────────────────────── application services ─────────────────────────
  catalog:
    build: ./services/catalog
    restart: unless-stopped
    environment:
      CATALOG_PORT: "8001"
      MONGO_URI: "mongodb://mongo:27017/media"
      KAFKA_BROKERS: "kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy

  search:
    build: ./services/search
    restart: unless-stopped
    environment:
      SEARCH_PORT: "8002"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "movies"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      EMBEDDING_DIM: "384"
      CATALOG_URL: "http://catalog:8001"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    ports:
      - "8002:8002"
    depends_on:
      - qdrant
      - catalog

  recommender:
    build: ./services/recommender
    restart: unless-stopped
    environment:
      RECOMMENDER_PORT: "8003"
      MONGO_URI: "mongodb://mongo:27017/media"
      KAFKA_BROKERS: "kafka:9092"
      CATALOG_URL: "http://catalog:8001"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    ports:
      - "8003:8003"
    depends_on:
      mongo:
        condition: service_healthy

  gateway:
    build: ./services/gateway
    restart: unless-stopped
    environment:
      GATEWAY_PORT: "8080"
      MONGO_URI: "mongodb://mongo:27017/media"
      REDIS_URL: "redis://redis:6379"
      CATALOG_URL: "http://catalog:8001"
      SEARCH_URL: "http://search:8002"
      RECOMMENDER_URL: "http://recommender:8003"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-dev-access-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-dev-refresh-secret}"
      RATE_LIMIT_CAPACITY: "${RATE_LIMIT_CAPACITY:-60}"
      RATE_LIMIT_REFILL: "${RATE_LIMIT_REFILL:-30}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  mongo_data:
  qdrant_data:
  kafka_data:
