global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: catalog
    metrics_path: /metrics
    static_configs:
      - targets: ["catalog:8001"]

  - job_name: search
    metrics_path: /metrics
    static_configs:
      - targets: ["search:8002"]

  - job_name: recommender
    metrics_path: /metrics
    static_configs:
      - targets: ["recommender:8003"]
