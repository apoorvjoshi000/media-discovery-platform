name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.service }} (python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, gateway, recommender, search]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Unit tests cover pure logic (RRF, CF, token bucket, CSV parsing) and do
      # not need the heavy runtime deps (torch, qdrant, motor), so install just
      # pytest to keep CI fast.
      - run: pip install pytest
      - run: pytest -q

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config -q

  build-images:
    name: build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, gateway, recommender]
    steps:
      - uses: actions/checkout@v4
      # The search image bundles torch + the embedding model and is slow to
      # build; it is validated via compose-validate and locally, not per push.
      - name: Build ${{ matrix.service }} image
        run: docker build -t media-${{ matrix.service }}:ci services/${{ matrix.service }}
