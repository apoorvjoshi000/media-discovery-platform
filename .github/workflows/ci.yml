name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-services:
    name: ${{ matrix.service }} (node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, gateway, recommender]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package.json
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: Unit tests
        run: npm test

  search-service:
    name: search (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Fusion tests are pure-python; skip the heavy torch/qdrant install in CI.
      - run: pip install pytest
      - run: pytest -q

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config -q

  build-images:
    name: build node images
    runs-on: ubuntu-latest
    needs: [node-services]
    strategy:
      matrix:
        service: [catalog, gateway, recommender]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: docker build -t media-${{ matrix.service }}:ci services/${{ matrix.service }}
